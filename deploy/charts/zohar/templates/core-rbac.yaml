apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "zohar.coreServiceAccountName" . }}
  namespace: {{ include "zohar.namespace" . }}
  labels:
    {{- include "zohar.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "zohar.fullname" . }}-core-gameserver-read
  namespace: {{ include "zohar.namespace" . }}
  labels:
    {{- include "zohar.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agones.dev"]
    resources: ["gameservers"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["agones.dev"]
    resources: ["gameservers/status"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "zohar.fullname" . }}-core-gameserver-read
  namespace: {{ include "zohar.namespace" . }}
  labels:
    {{- include "zohar.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "zohar.coreServiceAccountName" . }}
    namespace: {{ include "zohar.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "zohar.fullname" . }}-core-gameserver-read
